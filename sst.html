    <style>
        body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
        }
        body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: 
            linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
            url("https://res.cloudinary.com/daib0eknj/image/upload/v1770839313/patronBotellas_kn8m0g.png") center/cover no-repeat;
        z-index: -1;
        }
    .header {
    text-align: center;
    padding: 60px 20px;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .header-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px; /* espacio entre logo y texto */
    flex-wrap: wrap; /* se adapta en móvil */
    }

    .logo {
    width: 90px; /* ajusta según tamaño del logo */
    height: auto;
    }

    .header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
    font-weight: 600;
    }

    .header p {
    font-size: 1.2rem;
    opacity: 0.9;
    margin: 0;
    }
        .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 30px;
        }
        .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        cursor: pointer;
        transition: transform 0.2s;
        }
        .card:hover {
        transform: scale(1.03);
        }
        .card h3 {
        margin: 0;
        color: #333;
        }
        .card p {
        color: #666;
        font-size: 14px;
        }
                .nav-btn {
                    background: linear-gradient(135deg, #4a90e2, #007BFF);
                    color: #fff;
                    border: none;
                    padding: 10px 18px;
                    border-radius: 8px;
                    font-size: 1rem;
                    cursor: pointer;
                    margin: 0 8px 20px 0;
                    display: inline-block;
                    text-decoration: none;
                    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
                    transition: transform .2s, box-shadow .2s;
                }
                .nav-btn:hover {
                    background: linear-gradient(135deg, #357ab8, #0056c0);
                    transform: translateY(-2px);
                    box-shadow: 0 5px 10px rgba(0,0,0,0.2);
                }
    </style>
