<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Área de Calidad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #0a5fb4;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card h3 {
      margin: 0;
      color: #333;
    }
    .card p {
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>Área de Calidad</h1>

<div class="grid">

  <div class="card" onclick="window.open('https://forms.office.com/r/TU_LINK_AQUI', '_blank')">
    <h3>Gestión y Control de Higiene</h3>
    <p>Código: C-CX-06</p>
  </div>

  <div class="card" onclick="window.open('https://forms.office.com/r/TU_LINK_AQUI', '_blank')">
    <h3>Inspección de Procesos</h3>
    <p>Código: C-CX-07</p>
  </div>

</div>

</body>
</html>
